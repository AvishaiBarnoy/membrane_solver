name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.14.9

      - name: Run ruff check (linting)
        run: |
          ruff check .

      - name: Run ruff format check
        run: |
          ruff format --check


  test:
    name: Unit tests (py3.12)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run fast unit tests
        run: |
          pytest -q \
            tests/test_thetaB_scalar_optimizer_unit.py \
            tests/test_thetaB_optimizer_energy_guard.py \
            tests/test_flat_disk_one_leaflet_theory_unit.py

  test-unit-full:
    name: Unit tests full + coverage (py3.12, non-PR)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run full unit tests with coverage
        run: |
          pytest -q -m "unit" --cov=. --cov-report=xml

  regression:
    name: Regression tests (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run regression tests
        run: |
          pytest -q -m "regression and not benchmark"

  e2e-free-disk-convergence-core:
    name: E2E free-disk convergence core (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run free-disk convergence core E2E tests
        run: |
          # Keep fixture-heavy optimizer and main energy-sweep checks together so
          # the shard split lowers wall-clock time without duplicating the most
          # expensive module-scoped setup across jobs.
          pytest -q -o addopts='' \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_curved_theta_sweep_scales_linearly_with_imposed_drive \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_curved_theta_optimizer_beats_flat_stage_seed \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_curved_theta_gap_is_elastic_not_contact_limited \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_curved_theta_gap_is_dominated_by_tilt_in_growth \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_outer_band_tilt_in_half_weight_is_cleaner_than_exclusion \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_outer_shell_consistent_quadrature_lifts_curved_theta_b

  e2e-free-disk-convergence-regional:
    name: E2E free-disk convergence regional (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run free-disk convergence regional E2E tests
        run: |
          pytest -q -o addopts='' \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_tilt_in_overgrowth_is_near_rim_dominated \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_tilt_in_overgrowth_is_disk_rim_dominated \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_post_theta018_tilt_in_growth_is_outer_membrane_dominated \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_post_theta018_tilt_in_growth_is_outer_support_band_dominated \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_one_step_refinement_shrinks_support_band_but_not_total_outer_tilt_in \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_one_step_refinement_does_not_lift_curved_theta_b \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_shared_rim_tilt_in_exclusion_reduces_rim_overgrowth \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_outer_excess_is_outer_membrane_tilt_out_dominated \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_outer_row_tilt_out_exclusion_lifts_curved_thetaB \
            tests/test_kozlov_free_disk_thetaB_convergence_e2e.py::test_kozlov_free_disk_outer_band_tilt_in_exclusion_is_not_a_clean_fix

  e2e-flat-benchmark:
    name: E2E flat benchmark smoke (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run flat benchmark E2E smoke test
        run: |
          # Keep one representative flat-disk optimize/parity smoke on PRs.
          # Broader flat-disk benchmark coverage already runs in the regression
          # lane and in scheduled parity/benchmark workflows.
          pytest -q -o addopts='' \
            tests/test_flat_disk_one_leaflet_benchmark_e2e.py::test_flat_disk_kh_optimize_profile_and_continuity_e2e

  e2e-other:
    name: E2E other (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run remaining E2E tests
        run: |
          pytest -q -m "e2e" \
            --ignore=tests/test_kozlov_free_disk_thetaB_convergence_e2e.py \
            --ignore=tests/test_flat_disk_one_leaflet_benchmark_e2e.py

  benchmark-smoke:
    name: Smoke benchmark (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run smoke benchmark
        run: |
          python benchmarks/benchmark_dented_cube.py

  parity-exploratory:
    name: Theory parity exploratory (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run exploratory parity checks
        run: |
          pytest -q -o addopts='' -m "exhaustive" tests/test_theory_parity_expansion_exploratory.py

  parity-fixed-trend:
    name: Theory parity fixed trend (guarded gate)
    runs-on: ubuntu-latest
    # Keep this lane informative on PRs to avoid unrelated feature work being
    # blocked by cross-PR guarded-gate state; strict gating can still be
    # enforced on non-PR events by setting PARITY_GUARDED_GATE=true.
    continue-on-error: ${{ github.event_name == 'pull_request' || vars.PARITY_GUARDED_GATE != 'true' }}
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Generate fixed-lane parity trend artifact
        run: |
          python tools/theory_parity_trend.py

      - name: Restore guarded-gate state cache
        id: restore-guarded-state
        uses: actions/cache/restore@v4
        with:
          path: benchmarks/outputs/diagnostics/theory_parity_ci_state.yaml
          key: theory-parity-ci-state-${{ github.base_ref || github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            theory-parity-ci-state-${{ github.base_ref || github.ref_name }}-

      - name: Apply guarded gate (2 consecutive failures)
        run: |
          python tools/theory_parity_guarded_gate.py --required-consecutive-failures 2 || true

      - name: Upload fixed-lane parity trend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theory-parity-trend-${{ github.run_id }}
          path: |
            benchmarks/outputs/diagnostics/theory_parity_report.yaml
            benchmarks/outputs/diagnostics/theory_parity_trend.yaml
            benchmarks/outputs/diagnostics/theory_parity_ci_state.yaml

      - name: Save guarded-gate state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: benchmarks/outputs/diagnostics/theory_parity_ci_state.yaml
          key: theory-parity-ci-state-${{ github.base_ref || github.ref_name }}-${{ github.run_id }}

  benchmarks-full:
    name: Full benchmarks + profiles
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run benchmark suite with profiling
        run: |
          python tools/suite.py --profile --profile-top 50

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ github.run_id }}
          path: |
            benchmarks/results.json
            benchmarks/outputs/profiles
