[pytest]
testpaths = tests
addopts = -m "not acceptance and not benchmark and not e2e and not slow and not script"
markers =
    unit: fast isolated unit tests
    regression: numerical/behavioral regressions guarding past bugs
    e2e: end-to-end workflow tests (minimizer + modules + larger fixtures)
    acceptance: acceptance tests that validate user-visible behavior against baselines
    benchmark: performance-oriented tests (not for default CI)
    slow: expensive tests excluded from the default pytest path
    script: subprocess/CLI-heavy tests excluded from the default pytest path
    exhaustive: overlap-heavy slow tests kept out of the main slow suite
